<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffe0"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#080c10"/>
  <rect width="32" height="32" rx="6" fill="none" stroke="#00ffe0" stroke-width="1.2" opacity="0.35"/>

  <!-- S letter - proper S shape -->
  <g filter="url(#glow)">
    <path d="
      M 20 9
      C 20 9 13 7 10 10
      C 7 13 12 15.5 16 16
      C 20 16.5 24 18.5 22 22
      C 20 25 13 24 11 23
    " fill="none" stroke="url(#g)" stroke-width="2.8" stroke-linecap="round"/>
  </g>

  <!-- Bottom network dots -->
  <circle cx="10" cy="27.5" r="1.3" fill="#00ffe0" opacity="0.85" filter="url(#glow)"/>
  <circle cx="16" cy="27.5" r="1.3" fill="#00ff88" opacity="0.85" filter="url(#glow)"/>
  <circle cx="22" cy="27.5" r="1.3" fill="#00ffe0" opacity="0.85" filter="url(#glow)"/>
  <line x1="11.3" y1="27.5" x2="14.7" y2="27.5" stroke="#00ffe0" stroke-width="0.8" opacity="0.5"/>
  <line x1="17.3" y1="27.5" x2="20.7" y2="27.5" stroke="#00ffe0" stroke-width="0.8" opacity="0.5"/>
</svg>
